<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback | Atithi Canteen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#020010;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:80px 20px 40px;color:white;}
#gc{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.gnavbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;background:rgba(5,3,25,0.7);backdrop-filter:blur(20px);border-bottom:1px solid rgba(139,92,246,0.2);}
.gnav-brand{font-family:'Playfair Display',serif;font-size:18px;background:linear-gradient(135deg,#a78bfa,#60a5fa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.gnav-back{padding:7px 16px;border-radius:20px;font-size:13px;color:rgba(255,255,255,0.7);text-decoration:none;border:1px solid rgba(139,92,246,0.3);transition:0.3s;}
.gnav-back:hover{color:#a78bfa;background:rgba(139,92,246,0.1);}
.feedback-card{position:relative;z-index:2;width:100%;max-width:420px;background:rgba(5,3,25,0.82);border-radius:24px;padding:28px;text-align:center;border:1px solid rgba(139,92,246,0.2);animation:cardEntry 0.9s ease both;}
.feedback-card::before{content:"";position:absolute;inset:-1px;border-radius:24px;background:linear-gradient(120deg,rgba(139,92,246,0.5),rgba(59,130,246,0.3),rgba(236,72,153,0.4));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:borderGlow 4s linear infinite;pointer-events:none;}
.icon-header{font-size:48px;margin-bottom:10px;animation:bounce 1.5s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
h2{font-family:'Playfair Display',serif;font-size:24px;background:linear-gradient(135deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.sub{color:rgba(255,255,255,0.4);font-size:13px;margin-bottom:24px;}
.rating-box{margin-bottom:18px;text-align:left;}
.rating-label{display:block;margin-bottom:8px;font-size:12px;font-weight:600;color:#a78bfa;letter-spacing:1px;text-transform:uppercase;}
input[type="text"],textarea{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(139,92,246,0.2);background:rgba(139,92,246,0.07);color:white;font-size:14px;outline:none;font-family:'DM Sans',sans-serif;transition:0.3s;}
input[type="text"]:focus,textarea:focus{border-color:rgba(139,92,246,0.6);background:rgba(139,92,246,0.12);box-shadow:0 0 0 3px rgba(139,92,246,0.12);}
input[type="text"]::placeholder,textarea::placeholder{color:rgba(167,139,250,0.35);}
textarea{resize:none;margin-top:0;}
.emoji-group{display:flex;justify-content:space-around;font-size:30px;}
.emoji-group span{cursor:pointer;filter:grayscale(100%);transition:0.3s;}
.emoji-group span:hover{transform:scale(1.3);}
.emoji-group span.active{filter:grayscale(0%);transform:scale(1.4);}
.stars span{font-size:26px;cursor:pointer;color:rgba(139,92,246,0.2);transition:0.2s;}
.stars span.active{color:#a78bfa;transform:scale(1.15);}
.btn-submit{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#3b82f6);color:white;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:0.3s;position:relative;overflow:hidden;font-family:'DM Sans',sans-serif;animation:loginPulse 2s ease-in-out infinite;}
.btn-submit::after{content:"";position:absolute;top:-50%;left:-60%;width:30%;height:200%;background:rgba(255,255,255,0.15);transform:skewX(-20deg);animation:shine 2.5s ease-in-out infinite;}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,0.4);animation:none;}
@keyframes cardEntry{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes borderGlow{0%{background:linear-gradient(0deg,rgba(139,92,246,0.6),rgba(59,130,246,0.3),rgba(236,72,153,0.4))}33%{background:linear-gradient(120deg,rgba(139,92,246,0.6),rgba(59,130,246,0.3),rgba(236,72,153,0.4))}66%{background:linear-gradient(240deg,rgba(139,92,246,0.6),rgba(59,130,246,0.3),rgba(236,72,153,0.4))}100%{background:linear-gradient(360deg,rgba(139,92,246,0.6),rgba(59,130,246,0.3),rgba(236,72,153,0.4))}}
@keyframes loginPulse{0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,0.5)}50%{box-shadow:0 0 14px 6px rgba(124,58,237,0)}}
@keyframes shine{0%{left:-60%}100%{left:130%}}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<nav class="gnavbar"><div class="gnav-brand">🍴 Atithi Canteen AVCOE</div><a href="soham.html" class="gnav-back">← Home</a></nav>
<div class="feedback-card">
  <div class="icon-header">😋</div>
  <h2>How was your food?</h2>
  <div class="sub">Your feedback helps us improve 🍽️</div>
  <div class="rating-box"><span class="rating-label">Your Name</span><input type="text" id="custName" placeholder="Enter your name..."></div>
  <div class="rating-box"><span class="rating-label">Taste Rating</span><div class="emoji-group" id="tasteEmoji"><span onclick="setEmoji(this)">😫</span><span onclick="setEmoji(this)">😐</span><span onclick="setEmoji(this)">😊</span><span onclick="setEmoji(this)">😍</span></div></div>
  <div class="rating-box"><span class="rating-label">Hygiene</span><div class="stars" id="hygieneStars"><span onclick="setStar(1,this)">★</span><span onclick="setStar(2,this)">★</span><span onclick="setStar(3,this)">★</span><span onclick="setStar(4,this)">★</span><span onclick="setStar(5,this)">★</span></div></div>
  <div class="rating-box"><span class="rating-label">Suggestions</span><textarea id="comments" rows="3" placeholder="Write your feedback..."></textarea></div>
  <button class="btn-submit" onclick="submitFeedback()">Send Feedback 🚀</button>
</div>
<script>
const canvas=document.getElementById('gc'),ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const stars=Array.from({length:180},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.3+0.2,alpha:Math.random()*0.7+0.2,tSpeed:Math.random()*0.02+0.005,tOff:Math.random()*Math.PI*2,color:[[167,139,250],[96,165,250],[244,114,182],[255,255,255]][Math.floor(Math.random()*4)]}));
const nebulas=[{xR:0.1,yR:0.25,rR:0.25,c:[139,92,246]},{xR:0.88,yR:0.7,rR:0.2,c:[59,130,246]}];
const ss=[];setInterval(()=>ss.push({x:Math.random()*0.65,y:Math.random()*0.45,len:0,maxLen:0.12+Math.random()*0.1,speed:0.004+Math.random()*0.003,angle:Math.PI/4+(Math.random()-0.5)*0.4}),2500);
function draw(){const W=canvas.width,H=canvas.height,now=Date.now();ctx.clearRect(0,0,W,H);nebulas.forEach(n=>{const cx=n.xR*W+Math.sin(now*0.0003+n.xR*5)*18,cy=n.yR*H+Math.cos(now*0.0004+n.yR*5)*14,rad=n.rR*Math.min(W,H),g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);g.addColorStop(0,`rgba(${n.c[0]},${n.c[1]},${n.c[2]},0.2)`);g.addColorStop(1,`rgba(${n.c[0]},${n.c[1]},${n.c[2]},0)`);ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();});stars.forEach(s=>{const a=s.alpha*(0.5+0.5*Math.sin(now*s.tSpeed+s.tOff));ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(${s.color[0]},${s.color[1]},${s.color[2]},${a})`;ctx.fill();});for(let i=ss.length-1;i>=0;i--){const s=ss[i];s.len+=s.speed;const sx=s.x*W,sy=s.y*H,ex=sx+Math.cos(s.angle)*s.len*W,ey=sy+Math.sin(s.angle)*s.len*H,tail=Math.max(0,s.len-0.05),tx=sx+Math.cos(s.angle)*tail*W,ty=sy+Math.sin(s.angle)*tail*H,g=ctx.createLinearGradient(tx,ty,ex,ey);g.addColorStop(0,'rgba(255,255,255,0)');g.addColorStop(1,'rgba(220,200,255,0.9)');ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(ex,ey);ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.stroke();if(s.len>=s.maxLen)ss.splice(i,1);}requestAnimationFrame(draw);}
draw();
const BASE_URL="https://my-projct-production.up.railway.app";
let selectedTaste="",selectedStars=0;
function setEmoji(el){document.querySelectorAll('#tasteEmoji span').forEach(s=>s.classList.remove('active'));el.classList.add('active');selectedTaste=el.innerText;}
function setStar(val,el){selectedStars=val;document.querySelectorAll('#hygieneStars span').forEach((s,i)=>s.classList.toggle('active',i<val));}
function submitFeedback(){
  const name=document.getElementById('custName').value.trim();
  const comments=document.getElementById('comments').value;
  if(!name){alert("Please enter your name!");return;}
  if(!selectedTaste||selectedStars===0){alert("Please complete rating!");return;}
  fetch(`${BASE_URL}/feedback`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,taste:selectedTaste,hygiene:selectedStars,comments})})
  .then(r=>r.json()).then(d=>{if(d.success)alert("Feedback submitted! Thank you 😊");else alert("Failed! Please try again.");})
  .catch(()=>alert("Server error ❌"));
}
</script>
</body>
</html>
