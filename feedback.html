<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback | Atithi Canteen</title>

<style>
:root{
    --accent:#ff4757;
    --gold:#facc15;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    padding:20px;
    color:white;
}

.feedback-card{
    width:100%;
    max-width:420px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border-radius:25px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.icon-header{
    font-size:50px;
    animation: bounce 1.5s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
}

h2{ margin:10px 0 5px; }
p{ opacity:0.7; font-size:14px; }
.rating-box{ margin:20px 0; }

.rating-label{
    display:block;
    margin-bottom:10px;
    font-weight:bold;
    color:#facc15;
}

.emoji-group{
    display:flex;
    justify-content:space-around;
    font-size:30px;
}

.emoji-group span{
    cursor:pointer;
    filter:grayscale(100%);
    transition:0.3s;
}

.emoji-group span:hover{ transform:scale(1.3); }
.emoji-group span.active{
    filter:grayscale(0%);
    transform:scale(1.4);
}

.stars span{
    font-size:26px;
    cursor:pointer;
    color:#444;
    transition:0.2s;
}

.stars span.active{
    color:var(--gold);
    transform:scale(1.2);
}

input[type="text"]{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    outline:none;
    background: rgba(255,255,255,0.1);
    color:white;
    font-size:15px;
    box-sizing:border-box;
}

input[type="text"]::placeholder{ color:#ccc; }

textarea{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    outline:none;
    margin-top:10px;
    resize:none;
    background: rgba(255,255,255,0.1);
    color:white;
    box-sizing:border-box;
}

textarea::placeholder{ color:#ccc; }

.btn-submit{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background: linear-gradient(90deg,#ff4757,#ff6b81);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-top:20px;
    transition:0.3s;
}

.btn-submit:hover{
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(255,71,87,0.3);
}
</style>
</head>

<body>

<div class="feedback-card">

    <div class="icon-header">😋</div>
    <h2>How was your food?</h2>
    <p>Your feedback helps us improve 🍽️</p>

    <div class="rating-box">
        <span class="rating-label">Your Name</span>
        <input type="text" id="custName" placeholder="Enter your name...">
    </div>

    <div class="rating-box">
        <span class="rating-label">Taste Rating</span>
        <div class="emoji-group" id="tasteEmoji">
            <span onclick="setEmoji(this)">😫</span>
            <span onclick="setEmoji(this)">😐</span>
            <span onclick="setEmoji(this)">😊</span>
            <span onclick="setEmoji(this)">😍</span>
        </div>
    </div>

    <div class="rating-box">
        <span class="rating-label">Hygiene</span>
        <div class="stars" id="hygieneStars">
            <span onclick="setStar(1,this)">★</span>
            <span onclick="setStar(2,this)">★</span>
            <span onclick="setStar(3,this)">★</span>
            <span onclick="setStar(4,this)">★</span>
            <span onclick="setStar(5,this)">★</span>
        </div>
    </div>

    <div class="rating-box">
        <span class="rating-label">Suggestions</span>
        <textarea id="comments" rows="3" placeholder="Write your feedback..."></textarea>
    </div>

    <button class="btn-submit" onclick="submitFeedback()">Send Feedback 🚀</button>

</div>

<script>

const BASE_URL = "https://my-projct-production.up.railway.app";

let selectedTaste = "";
let selectedStars = 0;

function setEmoji(el){
    document.querySelectorAll('#tasteEmoji span').forEach(s=>s.classList.remove('active'));
    el.classList.add('active');
    selectedTaste = el.innerText;
}

function setStar(val, el){
    selectedStars = val;
    document.querySelectorAll('#hygieneStars span').forEach((s,i)=>{
        s.classList.toggle('active', i < val);
    });
}

function submitFeedback(){
    const name = document.getElementById('custName').value.trim();
    const comments = document.getElementById('comments').value;

    if(!name){
        alert("Please enter your name!");
        return;
    }

    if(!selectedTaste || selectedStars === 0){
        alert("Please complete rating!");
        return;
    }

    fetch(`${BASE_URL}/feedback`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: name,
            taste: selectedTaste,
            hygiene: selectedStars,
            comments: comments
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
    })
    .catch(err => {
        alert("Server error ❌");
        console.log(err);
    });
}

</script>

</body>
</html>
