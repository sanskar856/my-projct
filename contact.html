<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Atithi Canteen</title>

<style>
:root{
    --primary:#ff8c00;
    --secondary:#22c55e;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    padding:20px;
    color:white;
}

/* MAIN CARD */
.contact-container{
    max-width:450px;
    width:100%;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

/* HEADER */
.contact-header{
    background: rgba(255,140,0,0.2);
    text-align:center;
    padding:35px 20px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.contact-header h2{
    margin:0;
    font-size:26px;
    color:var(--primary);
}

.contact-header p{
    opacity:0.8;
}

/* CONTENT */
.contact-content{
    padding:25px;
}

/* CONTACT CARD */
.contact-method{
    display:flex;
    align-items:center;
    padding:15px;
    margin-bottom:12px;
    border-radius:15px;
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.contact-method:hover{
    transform:translateY(-5px);
    background: rgba(255,255,255,0.1);
    border-color: var(--primary);
}

/* ICON */
.icon-circle{
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    margin-right:15px;
    background: rgba(255,140,0,0.2);
}

/* TEXT */
.details h4{
    margin:0;
    font-size:15px;
}

.details p{
    margin:3px 0 0;
    font-size:13px;
    opacity:0.7;
}

/* HOURS */
.hours-box{
    margin-top:20px;
    padding:15px;
    background: rgba(255,255,255,0.05);
    border-radius:15px;
}

.hours-box h5{
    margin:0 0 10px;
    color:var(--primary);
}

.hour-row{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    margin-bottom:6px;
    opacity:0.85;
}

.hour-row.today{
    color:var(--secondary);
    font-weight:bold;
}

/* BACK BUTTON */
.btn-back{
    display:block;
    text-align:center;
    margin-top:15px;
    padding:12px;
    border-radius:12px;
    background: var(--primary);
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn-back:hover{
    transform:scale(1.05);
}

/* SMALL ANIMATION */
.contact-method{
    animation: fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="contact-container">

    <div class="contact-header">
        <h2>📞 Get in Touch</h2>
        <p>We are always here to help you</p>
    </div>

    <div class="contact-content">

        <a href="https://wa.me/919000000000" class="contact-method">
            <div class="icon-circle">💬</div>
            <div class="details">
                <h4>WhatsApp</h4>
                <p>Instant support chat</p>
            </div>
        </a>

        <a href="tel:+919000000000" class="contact-method">
            <div class="icon-circle">📞</div>
            <div class="details">
                <h4>Call Us</h4>
                <p>+91 9272157935 (sanskar Gaikwad)</p>
            </div>
        </a>

        <a href="#" class="contact-method">
            <div class="icon-circle">📍</div>
            <div class="details">
                <h4>Location</h4>
                <p>Atithi Canteen,Amrutvahini college of engg sangmner</p>
            </div>
        </a>

        <div class="hours-box">
            <h5>⏰ Operating Hours</h5>

            <div class="hour-row">
                <span>Mon - Sat</span>
                <span>8:00 AM - 9:00 PM</span>
            </div>

            <div class="hour-row today">
                <span>Sunday</span>
                <span>Closed</span>
            </div>
        </div>

        <a href="#" class="btn-back">← Back to Home</a>

    </div>
</div>

</body>
</html>
