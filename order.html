<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atithi Canteen | Order Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#020010;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px 40px;color:white;}
#gc{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.gnavbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;background:rgba(5,3,25,0.7);backdrop-filter:blur(20px);border-bottom:1px solid rgba(139,92,246,0.2);}
.gnav-brand{font-family:'Playfair Display',serif;font-size:18px;background:linear-gradient(135deg,#a78bfa,#60a5fa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.gnav-back{padding:7px 16px;border-radius:20px;font-size:13px;color:rgba(255,255,255,0.7);text-decoration:none;border:1px solid rgba(139,92,246,0.3);transition:0.3s;}
.gnav-back:hover{color:#a78bfa;background:rgba(139,92,246,0.1);}
.card{position:relative;z-index:2;width:100%;max-width:400px;background:rgba(5,3,25,0.82);border-radius:24px;padding:28px 24px;border:1px solid rgba(139,92,246,0.2);text-align:center;animation:cardEntry 0.8s cubic-bezier(0.34,1.56,0.64,1) both;}
.card::before{content:"";position:absolute;inset:-1px;border-radius:24px;background:linear-gradient(120deg,rgba(139,92,246,0.5),rgba(59,130,246,0.3),rgba(236,72,153,0.4));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:borderGlow 4s linear infinite;pointer-events:none;}
.order-icon{font-size:52px;margin-bottom:12px;animation:bounce 1.5s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.item-title{font-size:22px;font-weight:700;margin-bottom:4px;}
.price-tag{font-size:16px;color:#a78bfa;margin-bottom:24px;}
.progress-wrap{margin:20px 0 8px;}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;}
.bar{background:rgba(139,92,246,0.15);height:10px;border-radius:99px;overflow:hidden;}
.progress{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#a78bfa);border-radius:99px;transition:width 0.8s ease;}
.steps{display:flex;flex-direction:column;gap:10px;margin:20px 0;text-align:left;}
.step{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:14px;border:1px solid rgba(139,92,246,0.1);background:rgba(139,92,246,0.04);transition:0.4s;}
.step.done{background:rgba(139,92,246,0.12);border-color:rgba(139,92,246,0.35);}
.step.active{background:rgba(139,92,246,0.18);border-color:rgba(139,92,246,0.5);}
.step-icon{font-size:22px;min-width:32px;text-align:center;}
.step-name{font-size:14px;font-weight:600;color:rgba(255,255,255,0.4);}
.step.done .step-name,.step.active .step-name{color:#a78bfa;}
.step-desc{font-size:12px;color:rgba(255,255,255,0.25);margin-top:2px;}
.step-check{font-size:16px;opacity:0;transition:0.3s;color:#a78bfa;}
.step.done .step-check{opacity:1;}
.status-msg{font-size:15px;color:rgba(255,255,255,0.7);margin-top:16px;}
.eta{font-size:13px;color:rgba(167,139,250,0.4);margin-top:6px;}
@keyframes cardEntry{from{opacity:0;transform:translateY(30px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes borderGlow{0%{background:linear-gradient(0deg,rgba(139,92,246,0.6),rgba(59,130,246,0.3),rgba(236,72,153,0.4))}33%{background:linear-gradient(120deg,rgba(139,92,246,0.6),rgba(59,130,246,0.3),rgba(236,72,153,0.4))}66%{background:linear-gradient(240deg,rgba(139,92,246,0.6),rgba(59,130,246,0.3),rgba(236,72,153,0.4))}100%{background:linear-gradient(360deg,rgba(139,92,246,0.6),rgba(59,130,246,0.3),rgba(236,72,153,0.4))}}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<nav class="gnavbar"><div class="gnav-brand">🍴 Atithi Canteen Avcoe</div><a href="soham.html" class="gnav-back">← Home</a></nav>
<div class="card">
  <div class="order-icon" id="orderIcon">⏳</div>
  <div class="item-title" id="itemName">Loading...</div>
  <div class="price-tag" id="priceTag"></div>
  <div class="progress-wrap">
    <div class="progress-label"><span>Progress</span><span id="pctLabel">0%</span></div>
    <div class="bar"><div class="progress" id="progressBar"></div></div>
  </div>
  <div class="steps" id="stepsContainer"></div>
  <div class="status-msg" id="statusMsg">Your order is being received...</div>
  <div class="eta" id="etaMsg"></div>
</div>
<script>
const canvas=document.getElementById('gc'),ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const stars=Array.from({length:180},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.3+0.2,alpha:Math.random()*0.7+0.2,tSpeed:Math.random()*0.02+0.005,tOff:Math.random()*Math.PI*2,color:[[167,139,250],[96,165,250],[244,114,182],[255,255,255]][Math.floor(Math.random()*4)]}));
const nebulas=[{xR:0.1,yR:0.25,rR:0.25,c:[139,92,246]},{xR:0.88,yR:0.7,rR:0.2,c:[59,130,246]}];
const ss=[];setInterval(()=>ss.push({x:Math.random()*0.65,y:Math.random()*0.45,len:0,maxLen:0.12+Math.random()*0.1,speed:0.004+Math.random()*0.003,angle:Math.PI/4+(Math.random()-0.5)*0.4}),2500);
function draw(){const W=canvas.width,H=canvas.height,now=Date.now();ctx.clearRect(0,0,W,H);nebulas.forEach(n=>{const cx=n.xR*W+Math.sin(now*0.0003+n.xR*5)*18,cy=n.yR*H+Math.cos(now*0.0004+n.yR*5)*14,rad=n.rR*Math.min(W,H),g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);g.addColorStop(0,`rgba(${n.c[0]},${n.c[1]},${n.c[2]},0.2)`);g.addColorStop(1,`rgba(${n.c[0]},${n.c[1]},${n.c[2]},0)`);ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();});stars.forEach(s=>{const a=s.alpha*(0.5+0.5*Math.sin(now*s.tSpeed+s.tOff));ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(${s.color[0]},${s.color[1]},${s.color[2]},${a})`;ctx.fill();});for(let i=ss.length-1;i>=0;i--){const s=ss[i];s.len+=s.speed;const sx=s.x*W,sy=s.y*H,ex=sx+Math.cos(s.angle)*s.len*W,ey=sy+Math.sin(s.angle)*s.len*H,tail=Math.max(0,s.len-0.05),tx=sx+Math.cos(s.angle)*tail*W,ty=sy+Math.sin(s.angle)*tail*H,g=ctx.createLinearGradient(tx,ty,ex,ey);g.addColorStop(0,'rgba(255,255,255,0)');g.addColorStop(1,'rgba(220,200,255,0.9)');ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(ex,ey);ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.stroke();if(s.len>=s.maxLen)ss.splice(i,1);}requestAnimationFrame(draw);}
draw();
const params=new URLSearchParams(window.location.search);
const itemParam=params.get("item")||"Your Order";
const priceParam=params.get("price")||"0";
const orderId=params.get("id")||"";
document.getElementById("itemName").innerText=decodeURIComponent(itemParam);
document.getElementById("priceTag").innerText=priceParam>0?"₹"+priceParam:"";
if(orderId)document.getElementById("etaMsg").innerText="Order ID: #"+orderId;
const steps=[{name:"Order Received",icon:"📋",desc:"We got your order!",pct:25},{name:"Cooking",icon:"👨‍🍳",desc:"Chef is preparing your food",pct:50},{name:"Ready for Pickup",icon:"🔔",desc:"Almost there...",pct:75},{name:"Delivered!",icon:"✅",desc:"Enjoy your meal!",pct:100}];
const icons=["⏳","🍳","🔔","🎉"];
const msgs=["Your order is being received...","Chef is cooking! 👨‍🍳","Food ready! Come pick it up 🔔","Delivered! Enjoy 😋"];
const cont=document.getElementById("stepsContainer");
steps.forEach((s,i)=>{const div=document.createElement("div");div.className="step";div.id="step"+i;div.innerHTML=`<div class="step-icon">${s.icon}</div><div style="flex:1"><div class="step-name">${s.name}</div><div class="step-desc">${s.desc}</div></div><div class="step-check">✓</div>`;cont.appendChild(div);});
let cur=0;
function updateStep(i){for(let j=0;j<i;j++)document.getElementById("step"+j).className="step done";if(i<steps.length)document.getElementById("step"+i).className="step active";document.getElementById("progressBar").style.width=steps[i]?steps[i].pct+"%":"100%";document.getElementById("pctLabel").innerText=(steps[i]?steps[i].pct:100)+"%";document.getElementById("orderIcon").innerText=icons[i]||"✅";document.getElementById("statusMsg").innerText=msgs[i]||"Done!";}
updateStep(0);
const interval=setInterval(()=>{cur++;if(cur>=steps.length){clearInterval(interval);steps.forEach((_,i)=>document.getElementById("step"+i).className="step done");document.getElementById("progressBar").style.width="100%";document.getElementById("pctLabel").innerText="100%";document.getElementById("orderIcon").innerText="🎉";document.getElementById("statusMsg").innerText="Delivered! Enjoy 😋";return;}updateStep(cur);},4000);
</script>
</body>
</html>
