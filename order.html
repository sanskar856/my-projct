<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Tracking</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#ff8c00,#ff3d00);
  color: white;
  text-align: center;
  padding: 50px;
}

h1 {
  margin-bottom: 20px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 15px;
  width: 300px;
  margin: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.progress-bar {
  height: 10px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
  margin: 20px 0;
}

.progress {
  height: 10px;
  width: 0%;
  background: #22c55e;
  transition: 1s;
}

.status {
  font-size: 18px;
  margin-top: 10px;
}

</style>
</head>

<body>

<h1>🍽️ Order Tracking</h1>

<div class="card">

  <h2 id="itemName">Item</h2>
  <h3 id="price">Rs.0</h3>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <div class="status" id="status">Order Received 📦</div>

</div>

<script>

// 👉 URL मधून data ghe (menu varun yeto)
const params = new URLSearchParams(window.location.search);
const item = params.get("item");
const price = params.get("price");

// 👉 show item
document.getElementById("itemName").innerText = item;
document.getElementById("price").innerText = "Rs." + price;


// 👉 tracking animation
let progress = document.getElementById("progress");
let status = document.getElementById("status");

let steps = [
  "Order Received 📦",
  "Cooking Started 🍳",
  "Out for Delivery 🚚",
  "Delivered Successfully ✅"
];

let width = 0;
let step = 0;

let interval = setInterval(() => {

  width += 25;
  progress.style.width = width + "%";
  status.innerText = steps[step];

  step++;

  if(width >= 100){
    clearInterval(interval);
  }

}, 3000);

</script>

</body>
</html>
