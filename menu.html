<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athithi Canteen Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{min-height:100vh;overflow-x:hidden;background:linear-gradient(-45deg,#ff512f,#dd2476,#24c6dc,#5433ff);background-size:400% 400%;animation:bg 12s ease infinite;}
@keyframes bg{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.food-float{position:fixed;width:100%;height:100%;top:0;left:0;z-index:-2;overflow:hidden;}
.food-float span{position:absolute;bottom:-100px;font-size:28px;animation:floatUp 18s linear infinite;opacity:0.7;}
.food-float span:nth-child(1){left:10%;animation-duration:12s;}
.food-float span:nth-child(2){left:25%;animation-duration:18s;}
.food-float span:nth-child(3){left:40%;animation-duration:14s;}
.food-float span:nth-child(4){left:55%;animation-duration:20s;}
.food-float span:nth-child(5){left:70%;animation-duration:16s;}
.food-float span:nth-child(6){left:85%;animation-duration:22s;}
@keyframes floatUp{0%{transform:translateY(0) rotate(0);opacity:0;}50%{opacity:1;}100%{transform:translateY(-1000px) rotate(360deg);opacity:0;}}
.header{text-align:center;padding:25px;color:white;}
.header h1{font-size:2rem;}
#searchInput{width:60%;padding:10px;border:none;border-radius:10px;margin-top:10px;outline:none;}
.filters{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin:20px;}
.filter-btn{padding:10px 15px;border:none;border-radius:20px;cursor:pointer;background:white;font-size:14px;}
.filter-btn.active{background:orange;color:white;}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;padding:20px;}
.menu-card{background:rgba(255,255,255,0.95);border-radius:15px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,0.2);transition:0.3s;}
.menu-card:hover{transform:scale(1.05);}
.menu-thumb{width:100%;height:130px;object-fit:cover;display:block;}
.menu-emoji-box{width:100%;height:130px;display:flex;align-items:center;justify-content:center;font-size:60px;}
.menu-info{padding:10px;}
.menu-name{font-size:15px;font-weight:bold;color:#222;}
.menu-price{color:orange;font-weight:bold;margin:5px 0;}
.add-btn{width:100%;padding:8px;border:none;background:linear-gradient(135deg,#ff6b35,#f7931e);color:white;border-radius:10px;cursor:pointer;margin-top:6px;}
.notification{position:fixed;top:20px;right:20px;background:green;color:white;padding:10px 15px;border-radius:10px;display:none;z-index:999;}
.new-badge{background:#ff4444;color:white;font-size:10px;padding:2px 6px;border-radius:8px;margin-left:4px;}
.cat-label{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;margin-top:3px;font-weight:bold;}
.cat-snacks{background:#fff8e1;color:#f57f17;}
.cat-beverages{background:#e0f7fa;color:#00838f;}
.cat-icecream{background:#fce4ec;color:#c2185b;}
.cat-biscuits{background:#ede7f6;color:#6a1b9a;}
</style>
</head>

<body>
<div class="food-float">
  <span>🍪</span><span>🥤</span><span>🍦</span><span>☕</span><span>🍨</span><span>🧃</span>
</div>
<div class="header">
  <h1>🍽️ Athithi Canteen AVCOE Sangmner</h1>
  <input type="text" id="searchInput" placeholder="Search food...">
</div>
<div class="filters">
  <button class="filter-btn active" data-filter="all">🍽️ All</button>
  <button class="filter-btn" data-filter="snacks">🥪 Snacks</button>
  <button class="filter-btn" data-filter="beverages">🥤 Drinks</button>
  <button class="filter-btn" data-filter="icecream">🍦 Ice Cream</button>
  <button class="filter-btn" data-filter="biscuits">🍪 Biscuits</button>
  <button class="filter-btn" data-filter="under20">Under Rs.20</button>
</div>
<div class="menu-grid" id="menuGrid"></div>
<div class="notification" id="notification"></div>
<button class="add-btn">Add to Cart 🛒</button>

const catLabel={snacks:"🥪 Snack",beverages:"🥤 Drink",icecream:"🍦 Ice Cream",biscuits:"🍪 Biscuit"};
let cart=[];

function loadMenu(data){
  const grid=document.getElementById("menuGrid");
  grid.innerHTML="";
  data.forEach(item=>{
    const card=document.createElement("div");
    card.className="menu-card";
    card.dataset.category=item.category;
    card.dataset.price=item.price;
    const top = item.img
      ? `<img src="${item.img}" class="menu-thumb" onerror="this.style.display='none';this.nextSibling.style.display='flex'">         <div class="menu-emoji-box" style="background:${item.bg};display:none">${item.emoji}</div>`
      : `<div class="menu-emoji-box" style="background:${item.bg}">${item.emoji}</div>`;
    card.innerHTML = top + `
  <div class="menu-info">

    <div class="menu-name">
      ${item.name}${item.isNew ? '<span class="new-badge">NEW</span>' : ''}
    </div>

    <div class="menu-price">Rs.${item.price}</div>

    <span class="cat-label cat-${item.category}">
      ${catLabel[item.category]}
    </span><br>

    <a href="add.html?item=${encodeURIComponent(item.name)}&price=${item.price}">
      <button class="add-btn">Order Now 🚀</button>
    </a>

  </div>
`;
    grid.appendChild(card);
  });
}

function addToCart(n){cart.push(n);showMsg(n+" added! 🛒");}
function showMsg(m){
  const el=document.getElementById("notification");
  el.innerText=m;el.style.display="block";
  setTimeout(()=>el.style.display="none",2000);
}
document.getElementById("searchInput").addEventListener("input",function(){
  const v=this.value.toLowerCase();
  document.querySelectorAll(".menu-card").forEach(c=>{
    c.style.display=c.querySelector(".menu-name").innerText.toLowerCase().includes(v)?"block":"none";
  });
});
document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const f=btn.dataset.filter;
    document.querySelectorAll(".menu-card").forEach(c=>{
      const price=parseInt(c.dataset.price);
      if(f==="all") c.style.display="block";
      else if(f==="under20") c.style.display=price<=20?"block":"none";
      else c.style.display=c.dataset.category===f?"block":"none";
    });
  });
});
