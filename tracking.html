<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Tracking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f8f9fa; }

.tracker {
    max-width: 500px;
    margin: auto;
    margin-top: 80px;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="tracker text-center">
    <h2>🍽️ Order Tracking</h2>

    <h4 id="statusText" class="mt-4">Order Placed 🧾</h4>

    <!-- Progress -->
    <div class="progress mt-3">
        <div id="progressBar" class="progress-bar bg-success" style="width:25%"></div>
    </div>

    <!-- Timer -->
    <p class="mt-3">Estimated Time: <span id="timer">15</span> min</p>
</div>

<script>

let statusList = [
    "Order Placed 🧾",
    "Preparing 👨‍🍳",
    "Ready 🍽️",
    "Delivered ✅"
];

let progress = [25, 50, 75, 100];
let time = [15, 10, 5, 0];

let index = 0;

function updateUI() {
    document.getElementById("statusText").innerText = statusList[index];
    document.getElementById("progressBar").style.width = progress[index] + "%";
    document.getElementById("timer").innerText = time[index];
}

// Auto update every 5 sec
setInterval(() => {
    if (index < statusList.length - 1) {
        index++;
        updateUI();
    }
}, 5000);

</script>

</body>
</html>
