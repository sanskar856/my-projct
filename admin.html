<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | Atithi Canteen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#020617;color:white;min-height:100vh;}
canvas{position:fixed;top:0;left:0;z-index:0;}

/* header */
.header{position:relative;z-index:10;text-align:center;padding:30px 20px 10px;}
h1{font-size:26px;background:linear-gradient(135deg,#22c55e,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:glow 2s infinite alternate;}
@keyframes glow{from{filter:brightness(1);}to{filter:brightness(1.2);}}
.subtitle{font-size:13px;color:rgba(255,255,255,0.4);margin-top:4px;}

/* stats row */
.stats-row{position:relative;z-index:10;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding:16px 20px;}
.stat-card{background:rgba(255,255,255,0.05);border:1px solid rgba(34,197,94,0.2);border-radius:14px;padding:14px 22px;text-align:center;min-width:110px;}
.stat-num{font-size:26px;font-weight:700;color:#22c55e;}
.stat-lbl{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;letter-spacing:1px;text-transform:uppercase;}

/* controls */
.controls{position:relative;z-index:10;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:0 20px 16px;}
.btn-refresh{padding:10px 24px;border:none;border-radius:20px;background:linear-gradient(135deg,#22c55e,#16a34a);color:white;font-size:14px;font-weight:600;cursor:pointer;transition:0.2s;}
.btn-refresh:hover{transform:scale(1.05);box-shadow:0 4px 14px rgba(34,197,94,0.4);}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.filter-btn{padding:7px 16px;border:1px solid rgba(255,255,255,0.15);border-radius:20px;background:transparent;color:rgba(255,255,255,0.6);font-size:13px;cursor:pointer;transition:0.2s;}
.filter-btn.active,.filter-btn:hover{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.4);color:#22c55e;}

/* loading */
#loading{position:relative;z-index:10;text-align:center;padding:40px;font-size:16px;animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0.3;}}

/* table */
.table-wrap{position:relative;z-index:10;overflow-x:auto;padding:0 16px 40px;}
table{width:100%;border-collapse:collapse;background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);border-radius:16px;overflow:hidden;}
thead{background:rgba(34,197,94,0.1);}
th{padding:14px 12px;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.5);text-align:left;border-bottom:1px solid rgba(255,255,255,0.08);}
td{padding:13px 12px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px;vertical-align:top;}
tr:hover td{background:rgba(34,197,94,0.06);}
tr:last-child td{border-bottom:none;}

/* badges */
.status-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:0.5px;}
.s-pending{background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3);}
.s-cooking{background:rgba(249,115,22,0.15);color:#f97316;border:1px solid rgba(249,115,22,0.3);}
.s-delivered{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3);}

.pay-badge{padding:3px 10px;border-radius:12px;font-size:11px;}
.pay-upi{background:rgba(167,139,250,0.15);color:#a78bfa;}
.pay-cash{background:rgba(96,165,250,0.15);color:#60a5fa;}

/* action buttons */
.btn-cook{background:rgba(249,115,22,0.2);border:1px solid rgba(249,115,22,0.4);color:#f97316;padding:6px 14px;border-radius:10px;font-size:12px;cursor:pointer;transition:0.2s;margin:2px;}
.btn-done{background:rgba(34,197,94,0.2);border:1px solid rgba(34,197,94,0.4);color:#22c55e;padding:6px 14px;border-radius:10px;font-size:12px;cursor:pointer;transition:0.2s;margin:2px;}
.btn-cook:hover,.btn-done:hover{transform:scale(1.05);filter:brightness(1.2);}

/* popup */
#popup{position:fixed;top:20px;right:20px;background:linear-gradient(135deg,#22c55e,#16a34a);padding:12px 22px;border-radius:12px;font-size:14px;font-weight:600;display:none;z-index:999;box-shadow:0 4px 20px rgba(34,197,94,0.4);animation:slideIn 0.3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}

.empty-state{text-align:center;padding:50px;color:rgba(255,255,255,0.3);}
.empty-state .icon{font-size:48px;margin-bottom:12px;}

/* auto-refresh indicator */
.auto-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:rgba(34,197,94,0.7);padding:5px 12px;border-radius:20px;border:1px solid rgba(34,197,94,0.2);background:rgba(34,197,94,0.08);}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="header">
  <h1>🚀 Admin Panel — Atithi Canteen</h1>
  <p class="subtitle">AVCOE Sangamner • Live Orders Dashboard</p>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-num" id="totalCount">0</div><div class="stat-lbl">Total Orders</div></div>
  <div class="stat-card" style="border-color:rgba(251,191,36,0.3);"><div class="stat-num" style="color:#fbbf24;" id="pendingCount">0</div><div class="stat-lbl">Pending</div></div>
  <div class="stat-card" style="border-color:rgba(249,115,22,0.3);"><div class="stat-num" style="color:#f97316;" id="cookingCount">0</div><div class="stat-lbl">Cooking</div></div>
  <div class="stat-card" style="border-color:rgba(34,197,94,0.3);"><div class="stat-num" id="doneCount">0</div><div class="stat-lbl">Delivered</div></div>
</div>

<div class="controls">
  <button class="btn-refresh" onclick="loadOrders()">🔄 Refresh Now</button>
  <div class="auto-badge"><div class="dot"></div>Auto-refresh: 5s</div>
</div>

<div class="controls" style="padding-top:0;">
  <div class="filter-row">
    <button class="filter-btn active" onclick="filterOrders('all',this)">All</button>
    <button class="filter-btn" onclick="filterOrders('Pending',this)">⏳ Pending</button>
    <button class="filter-btn" onclick="filterOrders('Cooking',this)">🍳 Cooking</button>
    <button class="filter-btn" onclick="filterOrders('Delivered',this)">✅ Delivered</button>
  </div>
</div>

<div id="popup">✅ Updated!</div>
<div id="loading">Loading Orders... 🍽️</div>

<div class="table-wrap">
<table id="ordersTable" style="display:none;">
<thead>
<tr>
<th>#ID</th>
<th>Customer</th>
<th>Table</th>
<th>Items</th>
<th>Total</th>
<th>Payment</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="orders"></tbody>
</table>
<div id="emptyState" class="empty-state" style="display:none;">
  <div class="icon">📭</div>
  <div>No orders yet</div>
</div>
</div>

<script>
/* ===== PARTICLES ===== */
const canvas=document.getElementById("bg"),ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
window.addEventListener("resize",()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
const particles=[];
for(let i=0;i<70;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5+0.3,s:0.3+Math.random()*0.3});
function drawBg(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(34,197,94,0.6)";
  particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.y+=p.s;if(p.y>canvas.height)p.y=0;});
  requestAnimationFrame(drawBg);
}
drawBg();

/* ===== API ===== */
const BASE_URL="https://my-projct-production.up.railway.app";
let allOrders=[];
let currentFilter="all";

function loadOrders(){
  fetch(BASE_URL+"/orders")
  .then(r=>r.json())
  .then(data=>{
    document.getElementById("loading").style.display="none";
    if(!Array.isArray(data)||data.length===0){
      document.getElementById("ordersTable").style.display="none";
      document.getElementById("emptyState").style.display="block";
      updateStats([]);
      return;
    }
    allOrders=data;
    document.getElementById("ordersTable").style.display="table";
    document.getElementById("emptyState").style.display="none";
    updateStats(data);
    renderTable(data,currentFilter);
  })
  .catch(err=>{
    console.log("Error:",err);
    document.getElementById("loading").innerText="⚠️ Could not load orders. Check connection.";
  });
}

function updateStats(data){
  document.getElementById("totalCount").innerText=data.length;
  document.getElementById("pendingCount").innerText=data.filter(o=>!o.status||o.status==="Pending").length;
  document.getElementById("cookingCount").innerText=data.filter(o=>o.status==="Cooking").length;
  document.getElementById("doneCount").innerText=data.filter(o=>o.status==="Delivered").length;
}

function renderTable(data,filter){
  const filtered=filter==="all"?data:data.filter(o=>{
    if(filter==="Pending") return !o.status||o.status==="Pending";
    return o.status===filter;
  });
  
  let html="";
  if(filtered.length===0){
    html=`<tr><td colspan="8" style="text-align:center;padding:40px;color:rgba(255,255,255,0.3);">No orders in this category</td></tr>`;
  } else {
    filtered.forEach(o=>{
      const status=o.status||"Pending";
      const sc=status==="Pending"?"s-pending":status==="Cooking"?"s-cooking":"s-delivered";
      const pc=(o.payment||"Cash").toLowerCase().includes("upi")?"pay-upi":"pay-cash";
      let items="";
      try{
        const parsed=typeof o.items==="string"?JSON.parse(o.items):o.items;
        if(Array.isArray(parsed))items=parsed.map(i=>i.name||(typeof i==="string"?i:"")).filter(Boolean).join(", ")||"—";
        else items=o.items||"—";
      }catch{items=o.items||"—";}
      html+=`<tr>
        <td style="color:#a78bfa;font-weight:700;">#${o.id}</td>
        <td><div style="font-weight:600;">${o.name||"—"}</div></td>
        <td style="color:rgba(255,255,255,0.6);">${o.address||"—"}</td>
        <td style="max-width:160px;color:rgba(255,255,255,0.7);font-size:13px;">${items}</td>
        <td style="font-weight:700;color:#22c55e;">₹${o.total||0}</td>
        <td><span class="pay-badge ${pc}">${o.payment||"Cash"}</span></td>
        <td><span class="status-badge ${sc}">${status}</span></td>
        <td>
          <button class="btn-cook" onclick="updateStatus(${o.id},'Cooking')">🍳 Cooking</button>
          <button class="btn-done" onclick="updateStatus(${o.id},'Delivered')">✅ Done</button>
        </td>
      </tr>`;
    });
  }
  document.getElementById("orders").innerHTML=html;
}

function filterOrders(filter,btn){
  currentFilter=filter;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderTable(allOrders,filter);
}

function showPopup(){
  const p=document.getElementById("popup");
  p.style.display="block";
  setTimeout(()=>p.style.display="none",2000);
}

function updateStatus(id,status){
  fetch(BASE_URL+"/update-status",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,status})})
  .then(()=>{loadOrders();showPopup();})
  .catch(err=>console.log(err));
}

setInterval(loadOrders,5000);
loadOrders();
</script>
</body>
</html>
