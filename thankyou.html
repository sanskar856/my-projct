<!DOCTYPE html>
<html>
<head>
<title>Order Successful</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    
    /* 🌌 Galaxy Background */
    background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
}

/* ⭐ Stars Animation */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:transparent url('https://www.transparenttextures.com/patterns/stardust.png');
    animation: moveStars 60s linear infinite;
    opacity:0.4;
}

@keyframes moveStars{
    from{transform:translateY(0);}
    to{transform:translateY(-1000px);}
}

/* 💫 Card */
.card{
    background: rgba(255,255,255,0.95);
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    text-align:center;
    animation: fadeIn 1.5s ease;
    backdrop-filter: blur(10px);
}

/* 🎉 Heading Animation */
h1{
    color:#2e7d32;
    font-size:28px;
    animation: pop 0.6s ease;
}

/* ✨ Text */
p{
    font-size:16px;
    margin:10px 0;
    animation: fadeText 2s ease;
}

/* 🔥 Animations */
@keyframes fadeIn{
    from{opacity:0; transform:scale(0.8);}
    to{opacity:1; transform:scale(1);}
}

@keyframes pop{
    0%{transform:scale(0);}
    80%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

@keyframes fadeText{
    from{opacity:0;}
    to{opacity:1;}
}

/* 🌟 Glow Effect */
.card:hover{
    box-shadow:0 0 30px #00ffcc;
    transition:0.3s;
}
</style>

</head>

<body>

<div class="card">
    <h1>✅ Order Placed!</h1>
    <p>Thank you for ordering from Athiti Canteen 🍛</p>
    <p>Please complete your UPI payment.</p>
    <p><b>Sanskar Gaikwad</b></p>
</div>

</body>
</html>
