<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atithi Canteen - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'DM Sans', sans-serif;
    background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTkpHJ7QZP0B__VlAXbGrv6gL2DK2nAzIpNBYVtA3Ws5A&s') no-repeat center center/cover;
}

.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(2px);
}

.login-card {
    position: relative;
    width: 380px;
    padding: 40px 35px;
    border-radius: 24px;
    text-align: center;
    color: white;
    background: rgba(10,15,30,0.75);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    z-index: 2;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
}

.brand-badge {
    display: inline-block;
    background: linear-gradient(135deg, rgba(250,204,21,0.15), rgba(255,140,0,0.15));
    border: 1px solid rgba(250,204,21,0.3);
    border-radius: 50px;
    padding: 5px 16px;
    font-size: 11px;
    letter-spacing: 3px;
    color: #facc15;
    margin-bottom: 12px;
    text-transform: uppercase;
}

.login-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    background: linear-gradient(135deg, #facc15, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
}

.login-card p {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 24px;
    font-weight: 300;
}

.form-control {
    margin-bottom: 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08) !important;
    border: 1px solid rgba(255,255,255,0.12) !important;
    color: white !important;
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
}

.form-control::placeholder {
    color: rgba(255,255,255,0.35) !important;
}

.form-control:focus {
    box-shadow: 0 0 0 2px rgba(250,204,21,0.2) !important;
    border-color: rgba(250,204,21,0.4) !important;
}

.btn-login {
    width: 100%;
    border-radius: 12px;
    background: linear-gradient(135deg, #ff8c00, #facc15);
    color: #0a0f1e;
    font-weight: 700;
    padding: 12px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    transition: 0.3s;
    margin-bottom: 10px;
}

.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(255,140,0,0.3);
}

.btn-signup {
    width: 100%;
    border-radius: 12px;
    background: transparent;
    border: 1px solid rgba(34,197,94,0.4);
    color: #22c55e;
    font-weight: 500;
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    transition: 0.3s;
    margin-bottom: 10px;
}

.btn-signup:hover {
    background: rgba(34,197,94,0.1);
    transform: translateY(-2px);
}

.btn-about {
    width: 100%;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(250,204,21,0.15), rgba(255,140,0,0.1));
    border: 1px solid rgba(250,204,21,0.4);
    color: #facc15;
    font-weight: 500;
    padding: 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: 0.3s;
    cursor: pointer;
    margin-top: 4px;
    position: relative;
    overflow: hidden;
    animation: pulse 2s infinite;
}

.btn-about::before {
    content: "";
    position: absolute;
    top: -50%;
    left: -60%;
    width: 40%;
    height: 200%;
    background: rgba(255,255,255,0.15);
    transform: skewX(-20deg);
    animation: shine 2.5s infinite;
}

.btn-about:hover {
    background: linear-gradient(135deg, rgba(250,204,21,0.25), rgba(255,140,0,0.2));
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(250,204,21,0.2);
}

.divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0;
}

.divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.1);
}

.divider span {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
}

@keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(250,204,21,0.3); }
    50% { box-shadow: 0 0 0 6px rgba(250,204,21,0); }
}

@keyframes shine {
    0% { left: -60%; }
    100% { left: 130%; }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="login-card">
    <div class="brand-badge">AVCOE</div>
    <h2>Atithi Canteen</h2>
    <p>Sign in to place your order</p>

    <form id="loginForm">
        <input type="text" id="email" class="form-control" placeholder="Email / ID" required>
        <input type="password" id="password" class="form-control" placeholder="Password" required>

        <button type="submit" class="btn btn-login">Login →</button>
        <button type="button" onclick="signup()" class="btn btn-signup">Create Account</button>
    </form>

    <div class="divider"><span>MORE</span></div>

    <button class="btn-about" onclick="window.location.href='about.html'">
        ✨ About This Project — Must Read!
    </button>
</div>

<script>
const BASE_URL = "https://my-projct-production.up.railway.app";

document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    fetch(`${BASE_URL}/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){
            window.location.href = "soham.html";
        } else {
            alert("Invalid email or password!");  // ✅ alert(data.message) काढला
        }
    })
    .catch(err => alert("Server error! Please try again."));
});

function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(!email || !password){
        alert("Email and password enter");
        return;
    }

    fetch(`${BASE_URL}/signup`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){
            alert("Account created please login!");
        } else {
            alert(data.message || "Signup failed! Try again.");
        }
    })
    .catch(err => alert("Server error! Please try again."));
}
</script>

</body>
</html>
