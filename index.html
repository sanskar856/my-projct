<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atithi Canteen - Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'DM Sans', sans-serif;
    background: #020010;
    overflow: hidden;
}

#galaxy-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
}

.login-card {
    position: relative;
    z-index: 10;
    width: 380px;
    padding: 40px 35px;
    border-radius: 24px;
    text-align: center;
    color: white;
    background: rgba(5, 3, 25, 0.85);
    border: 1px solid rgba(139, 92, 246, 0.15);
    animation: cardEntry 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

.login-card::before {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: 24px;
    padding: 1px;
    background: linear-gradient(120deg, rgba(139,92,246,0.7), rgba(59,130,246,0.4), rgba(236,72,153,0.5));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    animation: borderGlow 4s linear infinite;
    pointer-events: none;
}

.brand-badge {
    display: inline-block;
    background: rgba(139, 92, 246, 0.12);
    border: 1px solid rgba(139, 92, 246, 0.4);
    border-radius: 50px;
    padding: 5px 16px;
    font-size: 11px;
    letter-spacing: 3px;
    color: #a78bfa;
    margin-bottom: 12px;
    text-transform: uppercase;
    animation: badgePulse 2.5s ease-in-out infinite;
}

.login-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
}

.typewriter-line {
    font-size: 13px;
    color: rgba(167, 139, 250, 0.7);
    margin-bottom: 24px;
    font-weight: 300;
    min-height: 20px;
    letter-spacing: 0.4px;
}

.cursor {
    display: inline-block;
    width: 2px;
    height: 13px;
    background: #a78bfa;
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.75s step-end infinite;
}

.form-control {
    margin-bottom: 12px;
    border-radius: 12px;
    background: rgba(139, 92, 246, 0.07) !important;
    border: 1px solid rgba(139, 92, 246, 0.2) !important;
    color: white !important;
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.3s, box-shadow 0.3s;
}

.form-control::placeholder { color: rgba(167, 139, 250, 0.35) !important; }

.form-control:focus {
    box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15) !important;
    border-color: rgba(139, 92, 246, 0.6) !important;
    background: rgba(139, 92, 246, 0.1) !important;
}

.btn-login {
    width: 100%;
    border-radius: 12px;
    background: linear-gradient(135deg, #7c3aed, #3b82f6);
    color: white;
    font-weight: 700;
    padding: 12px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    cursor: pointer;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
    transition: transform 0.25s, box-shadow 0.25s;
    animation: loginPulse 2s ease-in-out infinite;
}

.btn-login::after {
    content: "";
    position: absolute;
    top: -50%; left: -60%;
    width: 30%; height: 200%;
    background: rgba(255,255,255,0.2);
    transform: skewX(-20deg);
    animation: shine 2.5s ease-in-out infinite;
}

.btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,237,0.45); animation: none; }

.btn-signup {
    width: 100%;
    border-radius: 12px;
    background: transparent;
    border: 1px solid rgba(34, 197, 94, 0.4);
    color: #4ade80;
    font-weight: 500;
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    cursor: pointer;
    margin-bottom: 10px;
    transition: background 0.25s, transform 0.25s;
}

.btn-signup:hover { background: rgba(34, 197, 94, 0.1); transform: translateY(-2px); }

.btn-about {
    width: 100%;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(59,130,246,0.1));
    border: 1px solid rgba(139, 92, 246, 0.35);
    color: #a78bfa;
    font-weight: 500;
    padding: 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    margin-top: 4px;
    position: relative;
    overflow: hidden;
    animation: aboutPulse 2s ease-in-out infinite;
    transition: transform 0.25s;
}

.btn-about::before {
    content: "";
    position: absolute;
    top: -50%; left: -60%;
    width: 35%; height: 200%;
    background: rgba(255,255,255,0.1);
    transform: skewX(-20deg);
    animation: shine 2.8s ease-in-out infinite;
}

.btn-about:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(139,92,246,0.25); animation: none; }

.divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; }
.divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: rgba(139, 92, 246, 0.15); }
.divider span { font-size: 11px; color: rgba(167, 139, 250, 0.3); letter-spacing: 1px; }

@keyframes cardEntry {
    from { opacity: 0; transform: translateY(40px) scale(0.93); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes borderGlow {
    0%   { background: linear-gradient(0deg,   rgba(139,92,246,0.7), rgba(59,130,246,0.4), rgba(236,72,153,0.5)); }
    33%  { background: linear-gradient(120deg, rgba(139,92,246,0.7), rgba(59,130,246,0.4), rgba(236,72,153,0.5)); }
    66%  { background: linear-gradient(240deg, rgba(139,92,246,0.7), rgba(59,130,246,0.4), rgba(236,72,153,0.5)); }
    100% { background: linear-gradient(360deg, rgba(139,92,246,0.7), rgba(59,130,246,0.4), rgba(236,72,153,0.5)); }
}
@keyframes badgePulse { 0%,100% { box-shadow: 0 0 0 0 rgba(139,92,246,0.4); } 50% { box-shadow: 0 0 10px 4px rgba(139,92,246,0.1); } }
@keyframes loginPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(124,58,237,0.5); } 50% { box-shadow: 0 0 14px 6px rgba(124,58,237,0); } }
@keyframes aboutPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(139,92,246,0.4); } 50% { box-shadow: 0 0 10px 5px rgba(139,92,246,0); } }
@keyframes shine { 0% { left: -60%; } 100% { left: 130%; } }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>

<body>

<canvas id="galaxy-canvas"></canvas>

<div class="login-card">
    <div class="brand-badge">AVCOE</div>
    <h2>Atithi Canteen</h2>
    <div class="typewriter-line">
        <span id="tw-text"></span><span class="cursor"></span>
    </div>

    <form id="loginForm">
        <input type="text" id="email" class="form-control" placeholder="Email / ID" required>
        <input type="password" id="password" class="form-control" placeholder="Password" required>
        <button type="submit" class="btn btn-login">Login →</button>
        <button type="button" onclick="signup()" class="btn btn-signup">Create Account</button>
    </form>

    <div class="divider"><span>MORE</span></div>
    <button class="btn-about" onclick="window.location.href='about.html'">
        ✨ About This Project — Must Read!
    </button>
</div>

<script>
const canvas = document.getElementById('galaxy-canvas');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const stars = Array.from({length: 220}, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.5 + 0.2,
    alpha: Math.random() * 0.8 + 0.2,
    tSpeed: Math.random() * 0.02 + 0.005,
    tOffset: Math.random() * Math.PI * 2,
    color: [[167,139,250],[96,165,250],[244,114,182],[255,255,255]][Math.floor(Math.random()*4)]
}));

const nebulas = [
    { xR:0.1,  yR:0.2,  rR:0.28, c:[139,92,246]  },
    { xR:0.88, yR:0.75, rR:0.22, c:[59,130,246]   },
    { xR:0.5,  yR:0.04, rR:0.18, c:[236,72,153]   },
    { xR:0.75, yR:0.2,  rR:0.12, c:[139,92,246]   },
];

const shootingStars = [];
function spawnStar() {
    shootingStars.push({
        x: Math.random() * 0.65, y: Math.random() * 0.45,
        len: 0, maxLen: 0.15 + Math.random() * 0.12,
        speed: 0.004 + Math.random() * 0.003,
        angle: Math.PI/4 + (Math.random()-0.5)*0.4
    });
}
setInterval(spawnStar, 2000);

function draw() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    const now = Date.now();

    nebulas.forEach(n => {
        const cx = n.xR * W + Math.sin(now * 0.0003 + n.xR * 5) * 18;
        const cy = n.yR * H + Math.cos(now * 0.0004 + n.yR * 5) * 14;
        const rad = n.rR * Math.min(W, H);
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
        g.addColorStop(0,   `rgba(${n.c[0]},${n.c[1]},${n.c[2]},0.22)`);
        g.addColorStop(0.5, `rgba(${n.c[0]},${n.c[1]},${n.c[2]},0.06)`);
        g.addColorStop(1,   `rgba(${n.c[0]},${n.c[1]},${n.c[2]},0)`);
        ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI * 2);
        ctx.fillStyle = g; ctx.fill();
    });

    stars.forEach(s => {
        const a = s.alpha * (0.5 + 0.5 * Math.sin(now * s.tSpeed + s.tOffset));
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${s.color[0]},${s.color[1]},${s.color[2]},${a})`;
        ctx.fill();
    });

    for (let i = shootingStars.length - 1; i >= 0; i--) {
        const ss = shootingStars[i];
        ss.len += ss.speed;
        const sx = ss.x * W, sy = ss.y * H;
        const ex = sx + Math.cos(ss.angle) * ss.len * W;
        const ey = sy + Math.sin(ss.angle) * ss.len * H;
        const tail = Math.max(0, ss.len - 0.05);
        const tx = sx + Math.cos(ss.angle) * tail * W;
        const ty = sy + Math.sin(ss.angle) * tail * H;
        const g = ctx.createLinearGradient(tx, ty, ex, ey);
        g.addColorStop(0, `rgba(255,255,255,0)`);
        g.addColorStop(1, `rgba(220,200,255,0.9)`);
        ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(ex, ey);
        ctx.strokeStyle = g; ctx.lineWidth = 1.5; ctx.stroke();
        if (ss.len >= ss.maxLen) shootingStars.splice(i, 1);
    }
    requestAnimationFrame(draw);
}
draw();

const phrases = [
    "Order your favourite meal...",
    "Fresh food, fast delivery.",
    "Canteen mein swagat hai!",
    "Sign in to get started."
];
let pi = 0, ci = 0, deleting = false, pause = 0;
const twEl = document.getElementById('tw-text');

function typewriter() {
    if (pause > 0) { pause--; setTimeout(typewriter, 50); return; }
    const word = phrases[pi];
    if (!deleting) {
        twEl.textContent = word.slice(0, ci + 1);
        ci++;
        if (ci === word.length) { pause = 32; deleting = true; }
        setTimeout(typewriter, 75);
    } else {
        twEl.textContent = word.slice(0, ci - 1);
        ci--;
        if (ci === 0) { deleting = false; pi = (pi + 1) % phrases.length; pause = 10; }
        setTimeout(typewriter, 38);
    }
}
typewriter();
</script>

<script>
const BASE_URL = "https://my-projct-production.up.railway.app";

document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const email    = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    fetch(`${BASE_URL}/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            window.location.href = "soham.html";
        } else {
            alert("Invalid email or password!");
        }
    })
    .catch(() => alert("Server error! Please try again."));
});

function signup() {
    const email    = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Email and password enter karein");
        return;
    }

    fetch(`${BASE_URL}/signup`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert("Account created! Please login.");
        } else {
            alert(data.message || "Signup failed! Try again.");
        }
    })
    .catch(() => alert("Server error! Please try again."));
}
</script>

</body>
</html>
